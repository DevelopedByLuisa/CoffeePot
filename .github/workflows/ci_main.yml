name: CI (windows-latest)

on:
  push:
    branches:
        - main
        - develop
  pull_request:
    branches:
        - main
        - develop

env:
  SOLUTION: "Source/CoffeePot.API/CoffeePot.sln"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@767f00a3f09872d96a0cb9fcd5e6a4ff33311330

      - name: Setup NuGet
        uses: nuget/setup-nuget@2d995a9b3be3b21f613eec2b0d19cf2d01ccd325
        with:
          nuget-version: latest

      - name: Restore NuGet Packages
        run: nuget restore $env:SOLUTION -ConfigFile nuget.config -Verbosity normal

      - name: Build Solution
        run: msbuild $env:SOLUTION -m -verbosity:normal
